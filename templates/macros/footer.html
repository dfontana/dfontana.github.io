{% import "macros/icons.html" as icon_macros %}
{% macro footer(foot) %}
  <footer>
    <hr>
    <hr>
    <section class="author">
    <div class="authorimage" style="background-image: url({{ foot.profile }})"></div>
    <div class="author-content">
      <h4>{{ foot.author }}</h4>
      {% if foot.bio %}
        <p class="bio">{{foot.bio}}</p>
      {% endif %}
      {% if foot.location %}
      <p class="meta">
        {{ icon_macros::icon(name="map-marker") }} {{foot.location}}
      </p>
      {% endif %}
    </div>
    </section>
    </footer>
{% endmacro footer %}
